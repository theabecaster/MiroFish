app = "mirofish-sim"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  FLASK_DEBUG = "false"
  FLASK_HOST = "0.0.0.0"
  FLASK_PORT = "5001"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
